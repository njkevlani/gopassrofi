name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            goarch: arm64
          - arch: amd64
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test
        run: go test -v ./internal/...

      - name: Build binary
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -o "gopassrofi-linux-${{ matrix.arch }}" main.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gopassrofi-${{ matrix.arch }}
          path: gopassrofi-linux-${{ matrix.arch }}

  release:
    name: Create release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gopassrofi-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gopassrofi-linux-amd64
            dist/gopassrofi-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
